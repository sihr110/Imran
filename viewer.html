<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer - IRC Islamic Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation Bar - Same as main page */
        .navbar {
            background: #1a1a2e;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .navbar a:hover {
            background: #2e7d32;
            border-radius: 5px;
        }

        /* PDF Viewer Container - Full Width */
        .pdf-container {
            flex: 1;
            width: 95%;
            max-width: 1400px;
            margin: 20px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Toolbar with Full Screen Button Only */
        .toolbar {
            background: #1a1a2e;
            padding: 12px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            border-bottom: 1px solid #2e7d32;
        }

        .fullscreen-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fullscreen-btn:hover {
            background: #1b5e20;
            transform: scale(1.02);
        }

        /* PDF Embed - Takes most of the space */
        .pdf-embed {
            width: 100%;
            height: calc(100vh - 120px);
            min-height: 600px;
            border: none;
        }

        /* Footer */
        .footer {
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: auto;
        }

        /* Loading Message */
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            .toolbar {
                justify-content: center;
            }
            .pdf-embed {
                height: calc(100vh - 180px);
                min-height: 400px;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar - Same as main page -->
    <div class="navbar">
        <div class="nav-container">
            <a href="#" id="homeBtn">Home</a>
            <a href="#" id="aboutUsBtn">About Us</a>
            <a href="#" id="prayerTimesBtn">Prayer Times</a>
            <a href="#" id="eventsBtn">Events</a>
            <a href="#" id="educationBtn">Education</a>
            <a href="#" id="donateBtn">Donate</a>
            <a href="#" id="contactBtn">Contact</a>
        </div>
    </div>

    <!-- PDF Viewer Section -->
    <div class="pdf-container">
        <div class="toolbar">
            <button class="fullscreen-btn" id="fullscreenBtn">
                🖥️ Full Screen
            </button>
        </div>
        
        <div id="loadingMessage" class="loading">
            📄 Loading PDF document...
        </div>
        
        <iframe id="pdfFrame" class="pdf-embed" style="display: none;" frameborder="0"></iframe>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>🕌 IRC Islamic Center - Berlin, Connecticut, USA</p>
        <p>© 2026 IRC Islamic Center | All Rights Reserved</p>
    </div>

    <script>
        // ============================================
        // PDF VIEWER WITH FULL SCREEN OPTION
        // ============================================
        
        const MAIN_PAGE_URL = 'https://sihr110.github.io/Imran/';
        const PDF_BASE_URL = 'https://sihr110.github.io/Imran/pdf/';
        const VIEWER_URL = 'https://sihr110.github.io/Imran/viewer.html';
        
        // Get PDF filename from URL parameter
        function getFileFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('file');
        }
        
        const pdfFile = getFileFromURL();
        const pdfFullURL = PDF_BASE_URL + pdfFile;
        
        // Load PDF in iframe
        const pdfFrame = document.getElementById('pdfFrame');
        const loadingMessage = document.getElementById('loadingMessage');
        
        if (pdfFile) {
            pdfFrame.src = pdfFullURL;
            pdfFrame.onload = function() {
                loadingMessage.style.display = 'none';
                pdfFrame.style.display = 'block';
            };
            pdfFrame.onerror = function() {
                loadingMessage.innerHTML = '❌ Failed to load PDF. <a href="' + MAIN_PAGE_URL + '">Return to Home</a>';
            };
        } else {
            loadingMessage.innerHTML = '❌ No PDF file specified. <a href="' + MAIN_PAGE_URL + '">Return to Home</a>';
        }
        
        // Full Screen Function
        function toggleFullScreen() {
            const pdfContainer = document.querySelector('.pdf-container');
            
            if (!document.fullscreenElement) {
                pdfContainer.requestFullscreen().catch(err => {
                    alert(`Full screen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullScreen);
        
        // Helper function to open PDF in viewer (stay within viewer)
        function openPDFInViewer(filename) {
            window.location.href = VIEWER_URL + '?file=' + filename;
        }
        
        // Home button
        document.getElementById('homeBtn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = MAIN_PAGE_URL;
        });
        
        // Navigation buttons - open PDFs in same viewer
        document.getElementById('aboutUsBtn').addEventListener('click', function(e) {
            e.preventDefault();
            openPDFInViewer('1-about-us.pdf');
        });
        
        document.getElementById('prayerTimesBtn').addEventListener('click', function(e) {
            e.preventDefault();
            openPDFInViewer('2-prayer-times.pdf');
        });
        
        document.getElementById('eventsBtn').addEventListener('click', function(e) {
            e.preventDefault();
            openPDFInViewer('3-events.pdf');
        });
        
        document.getElementById('educationBtn').addEventListener('click', function(e) {
            e.preventDefault();
            openPDFInViewer('4-education.pdf');
        });
        
        document.getElementById('donateBtn').addEventListener('click', function(e) {
            e.preventDefault();
            openPDFInViewer('5-donate.pdf');
        });
        
        document.getElementById('contactBtn').addEventListener('click', function(e) {
            e.preventDefault();
            openPDFInViewer('6-contact.pdf');
        });
    </script>

</body>
</html>
